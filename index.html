<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>擬似社内AIツール - 複数ページ対応検証用</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 20px; color: #333; }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #6b7280; font-size: 0.95rem; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .ai-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
        .ai-card.moderator { border-top-color: #ef4444; }
        .ai-card.doc { border-top-color: #10b981; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #111827; }
        label { display: block; margin: 8px 0 4px; font-weight: bold; font-size: 0.85rem; color: #4b5563; }
        textarea { width: 100%; height: 100px; border: 1px solid #d1d5db; border-radius: 4px; resize: vertical; box-sizing: border-box; font-family: monospace; font-size: 0.85rem; }
        .output-area { height: 160px; background: #f9fafb; border-color: #10b981; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .btn { color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-generate { background: #2563eb; }
        .btn-generate:hover { background: #1d4ed8; }
        .btn-copy { background: #10b981; }
        .btn-copy:hover { background: #059669; }
    </style>
</head>
<body>

    <h1>マルチエージェント・コパイロット 擬似操作パネル</h1>
    <div class="sub-title">【複数ページ（ファイル名・関数動的特定）検証バージョン】</div>
    
    <div class="grid-container">
        <div class="ai-card moderator">
            <h2>タブ4: 司令塔AI</h2>
            <label>音声文字起こし / チャット入力欄</label>
            <textarea id="input-t4">新しく「管理者ページ(admin.html)」を追加して。そこに対象フォルダを切り替える関数（switchTargetFolder）を実装して。</textarea>
            <label>回答生成欄 (ファイル指定タスクを出力)</label>
            <textarea id="output-t4" class="output-area" placeholder="ここに複数ページ用の仕分け指示書が出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('moderator')">指示書を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t4').value)">コピー</button>
            </div>
        </div>

        <div class="ai-card">
            <h2>タブ1: HTML担当AI</h2>
            <label>チャット入力欄</label>
            <textarea id="input-t1" placeholder="司令塔からの指示が自動流し込みされます..."></textarea>
            <label>回答生成欄 (admin.htmlを出力)</label>
            <textarea id="output-t1" class="output-area" placeholder="ここにHTMLコードが出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('html')">admin.html生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t1').value)">コピー</button>
            </div>
        </div>

        <div class="ai-card">
            <h2>タブ3: JS担当AI</h2>
            <label>チャット入力欄</label>
            <textarea id="input-t3" placeholder="司令塔からの指示が自動流し込みされます..."></textarea>
            <label>回答生成欄 (admin_logic.jsを出力)</label>
            <textarea id="output-t3" class="output-area" placeholder="ここにJSコードが出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('js')">特定関数JS生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t3').value)">コピー</button>
            </div>
        </div>
    </div>

    <script>
        // 複数ページ（admin.html / admin_logic.js）のターゲット指定を含んだテンプレート
        const templates = {
            // 司令塔が「どのファイルをいじるか」を明記してタスクを分ける
            moderator: "複数ページ化の要求を仕分けました。\n\n[HTML_TASK]\n[FILE: admin.html]\n管理者用の画面UIを新規作成してください。設定項目用の入力フォームを配置します。\n[HTML_TASK_END]\n\n[JS_TASK]\n[FILE: admin_logic.js]\nフォルダ切り替え用の新関数「switchTargetFolder()」を追加実装してください。\n[JS_TASK_END]\n\n##TASKS_GENERATED##",
            
            // HTML担当が、自分が生成したファイルが「admin.html」であることを明示して出力
            html: "[FILE: admin.html]\n<!DOCTYPE html>\n<html>\n<head><title>管理者設定</title></head>\n<body>\n    <h1>管理者ページ</h1>\n    <input type='text' id='folder-path-input'>\n    <button onclick='switchTargetFolder()'>フォルダ切り替え</button>\n</body>\n</html>\n##CODE_UPDATE_COMPLETE##",
            
            // JS担当が、変更/追加対象のファイル名と関数ロジックを明示して出力
            js: "[FILE: admin_logic.js]\n/**\n * 管理者ページ用：対象フォルダ切り替え関数\n * 変更/追加対象関数: switchTargetFolder\n */\nfunction switchTargetFolder() {\n    const newPath = document.getElementById('folder-path-input').value;\n    console.log('検索対象フォルダを以下に変更しました: ' + newPath);\n    alert('対象フォルダを更新しました：' + newPath);\n}\n##CODE_UPDATE_COMPLETE##"
        };

        function generateOutput(role) {
            let targetId = "";
            if(role === 'moderator') targetId = 'output-t4';
            if(role === 'html') targetId = 'output-t1';
            if(role === 'js') targetId = 'output-t3';
            
            if(targetId) {
                document.getElementById(targetId).value = templates[role];
            }
        }
    </script>
</body>
</html>
