<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>擬似社内AIツール - オーケストレーション検証用</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 20px; color: #333; }
        h1 { text-align: center; color: #1e3a8a; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .ai-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
        .ai-card.moderator { border-top-color: #ef4444; }
        .ai-card.doc { border-top-color: #10b981; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #111827; display: flex; justify-content: space-between; }
        label { display: block; margin: 8px 0 4px; font-weight: bold; font-size: 0.85rem; color: #4b5563; }
        textarea { width: 100%; height: 80px; border: 1px solid #d1d5db; border-radius: 4px; resize: vertical; box-sizing: border-box; font-family: monospace; font-size: 0.85rem; }
        .output-area { height: 120px; background: #f9fafb; border-color: #10b981; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .btn { color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-generate { background: #2563eb; }
        .btn-generate:hover { background: #1d4ed8; }
        .btn-copy { background: #10b981; }
        .btn-copy:hover { background: #059669; }
        .timer-badge { background: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

    <h1>マルチエージェント・コパイロット 擬似操作パネル</h1>
    
    <div class="grid-container">
        <div class="ai-card moderator">
            <h2>タブ4: 司令塔AI <span class="timer-badge">3分タイマー連動</span></h2>
            <label>カスタムプロンプト設定枠</label>
            <textarea id="prompt-t4">あなたは司令塔AIです。音声を要約し、[HTML_TASK][CSS_TASK][JS_TASK]に仕分けて##TASKS_GENERATED##を末尾に付けて出力してください。</textarea>
            <label>音声文字起こし / チャット入力欄</label>
            <textarea id="input-t4" placeholder="（ここに音声文字起こしや指示が入ります）">チャット画面の右下に青色の検索ボタンを作って、クリックしたらアラートを出すようにして。</textarea>
            <label>回答生成欄</label>
            <textarea id="output-t4" class="output-area" placeholder="ここに司令塔の仕分け指示書が出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('moderator')">回答を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t4').value)">回答をコピー</button>
            </div>
        </div>

        <div class="ai-card doc">
            <h2>タブ5: MD・プロトコル管理AI</h2>
            <label>カスタムプロンプト設定枠</label>
            <textarea id="prompt-t5">仕様書の更新を行い、各AI用の新プロンプトを[HTML_PROMPT_START]等で挟んで出力してください。</textarea>
            <label>チャット入力欄</label>
            <textarea id="input-t5" placeholder="システムからの仕様変更指示が入ります..."></textarea>
            <label>回答生成欄</label>
            <textarea id="output-t5" class="output-area" placeholder="ここに新プロンプトやMDの更新内容が出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('doc')">回答を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t5').value)">回答をコピー</button>
            </div>
        </div>

        <div class="ai-card">
            <h2>タブ1: HTML担当AI</h2>
            <label>カスタムプロンプト設定枠</label>
            <textarea id="prompt-t1">あなたはHTML担当です。コードのみを出力し、末尾に##CODE_UPDATE_COMPLETE##を付けてください。</textarea>
            <label>チャット入力欄</label>
            <textarea id="input-t1" placeholder="司令塔からの指示が自動流し込みされます..."></textarea>
            <label>回答生成欄</label>
            <textarea id="output-t1" class="output-area" placeholder="ここにHTMLコードが出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('html')">回答を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t1').value)">回答をコピー</button>
            </div>
        </div>

        <div class="ai-card">
            <h2>タブ2: CSS担当AI</h2>
            <label>カスタムプロンプト設定枠</label>
            <textarea id="prompt-t2">あなたはCSS担当です。コードのみを出力し、末尾に##CODE_UPDATE_COMPLETE##を付けてください。</textarea>
            <label>チャット入力欄</label>
            <textarea id="input-t2" placeholder="司令塔からの指示が自動流し込みされます..."></textarea>
            <label>回答生成欄</label>
            <textarea id="output-t2" class="output-area" placeholder="ここにCSSコードが出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('css')">回答を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t2').value)">回答をコピー</button>
            </div>
        </div>

        <div class="ai-card">
            <h2>タブ3: JS担当AI</h2>
            <label>カスタムプロンプト設定枠</label>
            <textarea id="prompt-t3">あなたはJS担当です。コードのみを出力し、末尾に##CODE_UPDATE_COMPLETE##を付けてください。</textarea>
            <label>チャット入力欄</label>
            <textarea id="input-t3" placeholder="司令塔からの指示が自動流し込みされます..."></textarea>
            <label>回答生成欄</label>
            <textarea id="output-t3" class="output-area" placeholder="ここにJSコードが出力されます..."></textarea>
            <div class="btn-group">
                <button class="btn btn-generate" onclick="generateOutput('js')">回答を生成</button>
                <button class="btn btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('output-t3').value)">回答をコピー</button>
            </div>
        </div>
    </div>

    <script>
        // 各AIが生成するダミー成果物のテンプレートデータ
        const templates = {
            moderator: "音声からタスクを抽出・仕分けしました。\n\n[HTML_TASK]\n既存のコンテナに<button id='search-btn'>検索</button>を追加してください。\n[HTML_TASK_END]\n\n[CSS_TASK]\n#search-btn { background: #2196F3; color: white; padding: 10px 20px; border-radius: 4px; position: fixed; bottom: 20px; right: 20px; }\n[CSS_TASK_END]\n\n[JS_TASK]\ndocument.getElementById('search-btn').addEventListener('click', () => { alert('フォルダ走破検索を開始します'); });\n[JS_TASK_END]\n\n##TASKS_GENERATED##",
            
            doc: "【プロンプトアップデート要請】\n仕様書変更に伴い、新プロンプトを配布します。\n\n[HTML_PROMPT_START]\nあなたはHTML担当AIです。最新仕様書v1.2に基づいて、SharePointの内部列名マッピングを意識したコードを生成してください。出力末尾には##CODE_UPDATE_COMPLETE##を必須とします。\n[HTML_PROMPT_END]",
            
            html: "<div class='chat-container'>\n    <button id='search-btn'>検索</button>\n</div>\n##CODE_UPDATE_COMPLETE##",
            
            css: "#search-btn {\n    background: #2196F3;\n    color: white;\n    padding: 10px 20px;\n    border-radius: 4px;\n    position: fixed;\n    bottom: 20px;\n    right: 20px;\n}\n##CODE_UPDATE_COMPLETE##",
            
            js: "document.getElementById('search-btn').addEventListener('click', () => {\n    alert('フォルダ走破検索を開始します');\n});\n##CODE_UPDATE_COMPLETE##"
        };

        // ボタンを押したときにテキストエリアにダミー出力を書き込む関数
        function generateOutput(role) {
            let targetId = "";
            if(role === 'moderator') targetId = 'output-t4';
            if(role === 'doc') targetId = 'output-t5';
            if(role === 'html') targetId = 'output-t1';
            if(role === 'css') targetId = 'output-t2';
            if(role === 'js') targetId = 'output-t3';
            
            if(targetId) {
                document.getElementById(targetId).value = templates[role];
            }
        }
    </script>
</body>
</html>
